{% extends 'base/base.html' %}
{% block content %}
    <h1>Editar Documento</h1>
    <form action="{% url 'editar_documento' document_id %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar</button>
        <button type="submit" name="btn_deletar">Deletar</button>
    </form>
{% endblock %}
